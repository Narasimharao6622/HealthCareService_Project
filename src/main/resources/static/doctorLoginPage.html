<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor LoginPage</title>
    <link rel="stylesheet" href="./css/doctorCSS_files/doctorLoginPage.css">
</head>

<body>
    <div class="LoginPage">
        <header>
            <h1>Doctor LoginPage</h1>
        </header>
        <section>
            <form action="#" id="loginForm">
                <div class="userInputContainer">
                    <label for="userid" id="usernameHeading">Enter your User Id</label>
                    <input type="text" name="userid" id="userid">
                </div>
                <div class="passwordInputContainer">
                    <label for="passwordid">Enter your password</label>
                    <div class="passwordInputBlock">
                        <input type="password" name="passwordid" id="passwordid"><i class="fa-solid fa-eye-slash"
                            id="eyeKey"></i>
                    </div>
                </div>
                <div class="submitContainer">
                    <input type="submit" value="Login" id="submit">
                </div>
            </form>
        </section>
        <footer>
            <div class="footerContent">
                <a href="#">forget password</a>
                <p>Lorem ipsum dolor sit amederit adipisci. Praesis inventore similique perspiciatis commodi voluptatum.
                    <a href="about">about?</a></p>
            </div>
        </footer>
    </div>
</body>
<script src="./js/doctorJS_files/doctorLoginPage.js"></script>

</html>
