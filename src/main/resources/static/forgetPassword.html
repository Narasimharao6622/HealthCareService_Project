<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password</title>
    <link rel="stylesheet" href="./css/userCSS_files/forgetPassword.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
		integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
		crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="animationContaner">
        <div class="boble"></div>
    </div>
    <div class="forgetPage">
        <div class="emailBlock" id="emailBlock">
            <div class="heading box">
                Forget Password
            </div>
            <div class="content box">
                <form action="">
                    <label for="">Enter your Email id : </label>
                    <div id="emailerror"></div>
                    <input type="email" id="email" required>
                    <input type="submit" value="Send OTP" id="emailVerifyButton">
                    <div id="timerMessage"></div>
                </form>
            </div>
            <div class="otpBlock box">
                <div class="otpInputContainer">
                    <span>Enter OTP : </span><input type="text" id="otp" readonly>
                </div>
                <div id="otperror"></div>
                <div class="otpVerifyContainer">
                    <button id="otpVerifyButton">Verify</button>
                </div>
            </div>
        </div>
        <div class="changePasswordBlock" id="passwordBlock">
            <div class="passwordContainer">
                <div class="heading">
                    Change Password
                </div>
                <div class="passwordInputContainer">
                    <div class="newPasswordContainer">
                        <div class="newPasswordInputContainer">
                            <input type="password" name="" id="newPassword" placeholder="Enter new Password" required><i id="newPasswordeye"
                                class="fa-solid fa-eye-slash icon"></i>
                        </div>
                    </div>
                    <div class="conformPasswordContainer">
                        <div class="conformPasswordInputContainer">
                            <input type="password" name="" id="conformPassword" placeholder="conform password"><i id="conformPasswordeye"
                                class="fa-solid fa-eye-slash icon"></i>
                        </div>
                    </div>
                </div>
                 <div id="passwordErrorMessage"></div>
                <div class="footer">
                    <button id="setPassword">Change Password</button>
                </div>
            </div>
        </div>
    </div>
    <script src="./js/userJS_files/forgetPassword.js">
    </script>
</body>

</html>
