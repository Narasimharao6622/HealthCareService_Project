<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password</title>
    <link rel="stylesheet" href="/css/userCSS_files/forgetPassword.css">
</head>

<body>
    <div class="animationContaner">
        <div class="boble"></div>
    </div>
    <div class="forgetPage">
        <div class="emailBlock" id="emailBlock">
            <div class="heading box">
                Forget Password
            </div>
            <div class="content box">
                <form action="">
                    <label for="">Enter your Email id : </label>
                    <div id="emailerror"></div>
                    <input type="email" id="email" required>
                    <input type="submit" value="Send OTP" id="emailVerifyButton">
                    <div id="timerMessage"></div>
                </form>
            </div>
            <div class="otpBlock box">
                <div class="otpInputContainer">
                    <span>Enter OTP : </span><input type="text" id="otp" readonly>
                </div>
                <div id="otperror"></div>
                <div class="otpVerifyContainer">
                    <button id="otpVerifyButton">Verify</button>
                </div>
            </div>
        </div>
        <div class="changePasswordBlock" id="passwordBlock">
            <div class="passwordContainer">
                <div class="heading">
                    Enter New Password
                </div>
                <div class="passwordInputContainer">
                    <div class="newPasswordContainer">
                        <div class="newPasswordInputContainer">
                            <input type="password" name="" id="newPassword" required><i id="newPasswordeye"
                                class="fa-solid fa-eye-slash"></i>
                        </div>
                    </div>
                    <div class="conformPasswordContainer">
                        <div class="conformPasswordInputContainer">
                            <input type="password" name="" id="conformPassword"><i id="conformPasswordeye"
                                class="fa-solid fa-eye-slash"></i>
                        </div>
                    </div>
                </div>
                <div class="footer">
                    <button id="setPassword">Change Password</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/userJS_files/forgetPassword.js">
    </script>
</body>

</html>
