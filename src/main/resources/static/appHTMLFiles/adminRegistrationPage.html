<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Cropper CSS -->
    <link rel="stylesheet" href="./css/userCSS_files/cropper.min.css" />
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" /> -->

    <title>Admin Registration</title>
    <link rel="stylesheet" href="css/adminCSS_files/adminRegistrationPage.css">
</head>

<body>

    <div class="registration-container">

        <h2>Admin Registration</h2>

        <form id="adminForm">

            <div class="form-grid">

                <!-- Image Upload -->
                <div class="form-group full-width">
                    <label>Profile Image</label>

                    <input type="file" id="adminImage" accept="image/*" required>

                    <div id="cropImagePopUp">
                        <!-- Crop Area -->
                    <div class="image-container">
                        <img id="cropImage">
                    </div>

                    <!-- Crop Button -->
                    <button type="button" class="crop-btn" id="cropButton">
                        Crop Image
                    </button>
                    </div>


                    <img id="previewImage" class="image-preview" alt="Preview">
                </div>

                <!-- Name -->
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter full name" required>
                </div>

                <!-- DOB -->
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>

                <!-- Gender -->
                <div class="form-group">
                    <label>Gender</label>

                    <select id="gender" required>
                        <option value="">Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <!-- Join Date -->
                <div class="form-group">
                    <label>Join Date</label>
                    <input type="date" id="joinDate" required>
                </div>

                <!-- Mobile -->
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="mobile" maxlength="10" placeholder="Enter mobile number" required>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label>Email ID</label>
                    <input type="email" id="email" placeholder="Enter email" required>
                </div>

                <!-- Qualification -->
                <div class="form-group">
                    <label>Qualification</label>
                    <input type="text" id="qualification" placeholder="Enter qualification" required>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>

                <!-- Button -->
                <div class="form-group full-width">
                    <button type="submit" class="register-btn">
                        Register Admin
                    </button>
                </div>

            </div>

        </form>

    </div>

    <script src="js/adminJS_files/adminRegistrationPage.js"></script>
    <!-- Cropper JS -->
    <script src="./js/userJS_files/cropper.min.js"></script>
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script> -->


</body>

</html>
